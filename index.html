<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Discord Chat</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#2b2d31;
color:white;
display:flex;
height:100vh;
}

/* サーバーバー */

#servers{
width:70px;
background:#1e1f22;
display:flex;
flex-direction:column;
align-items:center;
padding-top:10px;
}

.server{
width:50px;
height:50px;
background:#5865f2;
border-radius:50%;
margin:6px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* チャンネル */

#channels{
width:220px;
background:#313338;
padding:10px;
overflow-y:auto;
}

.channel{
padding:8px;
border-radius:5px;
cursor:pointer;
margin:4px 0;
background:#383a40;
}

.channel:hover{
background:#4a4d54;
}

/* メイン */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* ヘッダー */

#header{
background:#313338;
padding:10px;
display:flex;
justify-content:space-between;
}

/* チャット */

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
margin:8px 0;
}

.message img{
max-width:200px;
border-radius:6px;
margin-top:5px;
}

/* 入力 */

#input{
display:flex;
padding:10px;
background:#383a40;
}

#input input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:5px;
}

#input button{
background:#5865f2;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

#login{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#2b2d31;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#login input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

.hidden{
display:none;
}

/* スマホ */

@media (max-width:700px){

#channels{
width:160px;
}

#servers{
width:55px;
}

}

</style>

</head>

<body>

<div id="servers">
<div class="server">🏫</div>
</div>

<div id="channels">

<input id="roomName" placeholder="部屋作成">
<button onclick="createRoom()">作成</button>

<div id="roomList"></div>

</div>

<div id="main">

<div id="header">

<div id="roomTitle">チャット</div>
<div>👥 <span id="count">0</span></div>

</div>

<div id="chat"></div>

<div id="input">

<input id="msg" placeholder="メッセージ">

<input type="file" id="imgSend">

<button onclick="send()">送信</button>

</div>

</div>

<div id="login">

<h2>School Chat</h2>

<input id="pass" type="password" placeholder="password">
<button onclick="login()">ログイン</button>

<input id="username" placeholder="ユーザー名">

</div>

<script>

const PASSWORD="Smyr5972"

let username=""
let currentRoom=""
let rooms={}
let members={}

function login(){

let pass=document.getElementById("pass").value

if(pass!==PASSWORD){

alert("パスワード違います")
return

}

username=document.getElementById("username").value

if(username===""){

alert("ユーザー名入力")
return

}

document.getElementById("login").classList.add("hidden")

}

function createRoom(){

let name=document.getElementById("roomName").value

if(name==="") return

if(!rooms[name]){

rooms[name]=[]
members[name]=[]

}

updateRooms()

}

function updateRooms(){

let list=document.getElementById("roomList")

list.innerHTML=""

for(let r in rooms){

let div=document.createElement("div")

div.className="channel"
div.innerText="# "+r

div.onclick=function(){

join(r)

}

list.appendChild(div)

}

}

function join(room){

currentRoom=room

members[room].push(username)

document.getElementById("roomTitle").innerText="# "+room

render()

}

function send(){

let text=document.getElementById("msg").value
let file=document.getElementById("imgSend").files[0]

if(text){

rooms[currentRoom].push({user:username,text:text})

}

if(file){

let reader=new FileReader()

reader.onload=function(e){

rooms[currentRoom].push({user:username,img:e.target.result})

render()

}

reader.readAsDataURL(file)

}

document.getElementById("msg").value=""
document.getElementById("imgSend").value=""

render()

notify()

}

function render(){

let chat=document.getElementById("chat")

chat.innerHTML=""

rooms[currentRoom].forEach(m=>{

let div=document.createElement("div")

div.className="message"

if(m.text){

div.innerText=m.user+" : "+m.text

}

if(m.img){

div.innerHTML=m.user+"<br><img src='"+m.img+"'>"

}

chat.appendChild(div)

})

document.getElementById("count").innerText=members[currentRoom].length

}

function notify(){

if(Notification.permission==="granted"){

new Notification("新しいメッセージ")

}else{

Notification.requestPermission()

}

}

</script>

</body>
</html>
