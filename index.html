<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Chat</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#2b2d31;
color:white;
display:flex;
height:100vh;
}

#channels{
width:220px;
background:#313338;
padding:10px;
overflow-y:auto;
}

.channel{
padding:8px;
border-radius:6px;
cursor:pointer;
margin:5px 0;
background:#383a40;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
background:#313338;
padding:10px;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
display:flex;
margin:10px 0;
cursor:pointer;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin-right:8px;
}

.content-img{
max-width:200px;
border-radius:6px;
margin-top:5px;
}

#input{
display:flex;
padding:10px;
background:#383a40;
}

#input input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:5px;
}

#input button{
background:#5865f2;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

#menu{
position:fixed;
background:#1e1f22;
border-radius:6px;
padding:5px;
display:none;
}

#menu div{
padding:8px;
cursor:pointer;
}

#menu div:hover{
background:#444;
}

#setup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#2b2d31;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#setup input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div id="channels">

<input id="roomName" placeholder="部屋作成">
<button onclick="createRoom()">作成</button>

<div id="roomList"></div>

</div>

<div id="main">

<div id="header">チャット</div>

<div id="chat"></div>

<div id="input">

<input id="msg" placeholder="メッセージ">
<input type="file" id="imgSend">
<button onclick="send()">送信</button>

</div>

</div>

<div id="menu">

<div onclick="copyMsg()">コピー</div>
<div onclick="likeMsg()">👍リアクション</div>
<div onclick="deleteMsg()">削除</div>

</div>

<div id="setup">

<h2>プロフィール設定</h2>

<input id="username" placeholder="ユーザー名">
<input type="file" id="avatar">

<button onclick="start()">開始</button>

</div>

<script>

let username=""
let avatar="https://cdn-icons-png.flaticon.com/512/149/149071.png"

let currentRoom=""
let rooms={}

let selectedRoom=""
let selectedIndex=0

function start(){

username=document.getElementById("username").value

if(username===""){
alert("ユーザー名入力")
return
}

let file=document.getElementById("avatar").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){

avatar=e.target.result

}

reader.readAsDataURL(file)

}

document.getElementById("setup").style.display="none"

}

function createRoom(){

let name=document.getElementById("roomName").value

if(!rooms[name]){

rooms[name]=[]

}

updateRooms()

}

function updateRooms(){

let list=document.getElementById("roomList")

list.innerHTML=""

for(let r in rooms){

let div=document.createElement("div")

div.className="channel"
div.innerText="# "+r

div.onclick=function(){

join(r)

}

list.appendChild(div)

}

}

function join(room){

currentRoom=room

document.getElementById("header").innerText="# "+room

render()

}

function send(){

let text=document.getElementById("msg").value
let file=document.getElementById("imgSend").files[0]

if(text){

rooms[currentRoom].push({
user:username,
avatar:avatar,
text:text,
like:0
})

}

if(file){

let reader=new FileReader()

reader.onload=function(e){

rooms[currentRoom].push({
user:username,
avatar:avatar,
img:e.target.result,
like:0
})

render()

}

reader.readAsDataURL(file)

}

document.getElementById("msg").value=""
document.getElementById("imgSend").value=""

render()

}

function render(){

let chat=document.getElementById("chat")

chat.innerHTML=""

rooms[currentRoom].forEach((m,i)=>{

let div=document.createElement("div")

div.className="message"

div.onclick=function(e){

selectedIndex=i
selectedRoom=currentRoom

let menu=document.getElementById("menu")

menu.style.display="block"
menu.style.left=e.pageX+"px"
menu.style.top=e.pageY+"px"

}

let html=""

html+="<img class='avatar' src='"+m.avatar+"'>"
html+="<div><b>"+m.user+"</b><br>"

if(m.text){

html+=m.text

}

if(m.img){

html+="<br><img class='content-img' src='"+m.img+"'>"

}

if(m.like>0){

html+="<br>👍 "+m.like

}

html+="</div>"

div.innerHTML=html

chat.appendChild(div)

})

}

function deleteMsg(){

rooms[selectedRoom].splice(selectedIndex,1)

document.getElementById("menu").style.display="none"

render()

}

function likeMsg(){

rooms[selectedRoom][selectedIndex].like++

document.getElementById("menu").style.display="none"

render()

}

function copyMsg(){

let m=rooms[selectedRoom][selectedIndex]

if(m.text){

navigator.clipboard.writeText(m.text)

}

document.getElementById("menu").style.display="none"

}

</script>

</body>
</html>
