<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Discord</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#2b2d31;
color:white;
display:flex;
height:100vh;
}

/* 左チャンネル */

#channels{
width:220px;
background:#313338;
padding:10px;
overflow-y:auto;
}

.channel{
padding:8px;
border-radius:6px;
cursor:pointer;
margin:5px 0;
background:#383a40;
}

.channel:hover{
background:#4a4d54;
}

/* メイン */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#header{
background:#313338;
padding:10px;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

/* メッセージ */

.message{
display:flex;
margin:10px 0;
cursor:pointer;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
margin-right:8px;
}

.content-img{
max-width:200px;
border-radius:6px;
margin-top:5px;
}

/* 右メンバー */

#members{
width:200px;
background:#2b2d31;
padding:10px;
}

.member{
display:flex;
align-items:center;
margin:6px 0;
}

.member img{
width:25px;
height:25px;
border-radius:50%;
margin-right:6px;
}

/* 入力 */

#input{
display:flex;
padding:10px;
background:#383a40;
}

#input input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
margin-right:5px;
}

#input button{
background:#5865f2;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* メニュー */

#menu{
position:fixed;
background:#1e1f22;
border-radius:6px;
padding:5px;
display:none;
}

#menu div{
padding:8px;
cursor:pointer;
}

#menu div:hover{
background:#444;
}

/* プロフィール */

#setup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#2b2d31;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#setup input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div id="channels">

<h3>ルーム</h3>

<input id="roomName" placeholder="部屋作成">
<button onclick="createRoom()">作成</button>

<div id="roomList"></div>

<h3>DM</h3>

<div id="dmList"></div>

</div>

<div id="main">

<div id="header">チャット</div>

<div id="chat"></div>

<div id="input">

<input id="msg" placeholder="メッセージ">
<input type="file" id="imgSend">
<button onclick="send()">送信</button>

</div>

</div>

<div id="members">

<h3>メンバー</h3>

<div id="memberList"></div>

</div>

<div id="menu">

<div onclick="copyMsg()">コピー</div>
<div onclick="react('👍')">👍</div>
<div onclick="react('❤️')">❤️</div>
<div onclick="react('😂')">😂</div>
<div onclick="editMsg()">編集</div>
<div onclick="deleteMsg()">削除</div>
<div onclick="pinMsg()">📌ピン</div>

</div>

<div id="setup">

<h2>プロフィール設定</h2>

<input id="username" placeholder="ユーザー名">
<input type="file" id="avatar">

<button onclick="start()">開始</button>

</div>

<script>

let username=""
let avatar="https://cdn-icons-png.flaticon.com/512/149/149071.png"

let rooms={}
let members=[]
let currentRoom=""

let selectedIndex=0

function start(){

username=document.getElementById("username").value

if(username===""){
alert("ユーザー名入力")
return
}

let file=document.getElementById("avatar").files[0]

if(file){

let reader=new FileReader()

reader.onload=function(e){
avatar=e.target.result
}

reader.readAsDataURL(file)

}

members.push({name:username,avatar:avatar})

updateMembers()

document.getElementById("setup").style.display="none"

}

function updateMembers(){

let list=document.getElementById("memberList")

list.innerHTML=""

members.forEach(m=>{

let div=document.createElement("div")

div.className="member"

div.innerHTML="<img src='"+m.avatar+"'>🟢 "+m.name

list.appendChild(div)

})

}

function createRoom(){

let name=document.getElementById("roomName").value

if(!rooms[name]) rooms[name]=[]

updateRooms()

}

function updateRooms(){

let list=document.getElementById("roomList")

list.innerHTML=""

for(let r in rooms){

let div=document.createElement("div")

div.className="channel"
div.innerText="# "+r

div.onclick=function(){join(r)}

list.appendChild(div)

}

}

function join(room){

currentRoom=room

document.getElementById("header").innerText="# "+room

render()

}

function send(){

let text=document.getElementById("msg").value
let file=document.getElementById("imgSend").files[0]

if(text){

rooms[currentRoom].push({
user:username,
avatar:avatar,
text:text,
react:[]
})

}

if(file){

let reader=new FileReader()

reader.onload=function(e){

rooms[currentRoom].push({
user:username,
avatar:avatar,
img:e.target.result,
react:[]
})

render()

}

reader.readAsDataURL(file)

}

document.getElementById("msg").value=""
render()

}

function render(){

let chat=document.getElementById("chat")

chat.innerHTML=""

rooms[currentRoom].forEach((m,i)=>{

let div=document.createElement("div")
div.className="message"

div.onclick=function(e){

selectedIndex=i

let menu=document.getElementById("menu")

menu.style.display="block"
menu.style.left=e.pageX+"px"
menu.style.top=e.pageY+"px"

}

let html=""

html+="<img class='avatar' src='"+m.avatar+"'>"
html+="<div><b>"+m.user+"</b><br>"

if(m.text) html+=m.text

if(m.img) html+="<br><img class='content-img' src='"+m.img+"'>"

if(m.react.length>0){

html+="<br>"+m.react.join(" ")

}

html+="</div>"

div.innerHTML=html

chat.appendChild(div)

})

}

function deleteMsg(){

rooms[currentRoom].splice(selectedIndex,1)

render()

}

function react(r){

rooms[currentRoom][selectedIndex].react.push(r)

render()

}

function editMsg(){

let text=prompt("編集")

if(text){

rooms[currentRoom][selectedIndex].text=text

render()

}

}

function copyMsg(){

navigator.clipboard.writeText(rooms[currentRoom][selectedIndex].text)

}

function pinMsg(){

alert("📌ピンしました")

}

</script>

</body>
</html>
