<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f5f7fb;
color:#222;
display:flex;
flex-direction:column;
height:100vh;
}

/* ヘッダー */

header{
background:#4a90e2;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* チャット */

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

/* メッセージ */

.message{
display:flex;
align-items:flex-start;
background:white;
padding:12px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

/* 入力 */

#input{
display:flex;
padding:10px;
background:#e9eef6;
}

#msg{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#4a90e2;
border:none;
color:white;
padding:12px 18px;
margin-left:5px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#357abd;
}

</style>

</head>

<body>

<header>🏫 School Chat</header>

<div id="chat"></div>

<div id="input">

<input id="msg" placeholder="メッセージを入力">

<button onclick="send()">送信</button>

</div>

<script>

const supabase = supabase.createClient(
"https://inhjvgnhwfyzstehgbxx.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluaGp2Z25od2Z5enN0ZWhnYnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTc5MjcsImV4cCI6MjA4ODc5MzkyN30._2n8f61N-sti0UHCGReVvt8L63U8J8f4Vi226xe9HnI"
)

let username = prompt("ユーザー名を入力")

let avatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png"

/* メッセージ送信 */

async function send(){

let text = document.getElementById("msg").value

if(text==="") return

await supabase
.from("messages")
.insert({
user:username,
text:text,
avatar:avatar
})

document.getElementById("msg").value=""

}

/* メッセージ受信 */

supabase
.channel('chat')
.on(
'postgres_changes',
{
event:'INSERT',
schema:'public',
table:'messages'
},
payload=>{

let m = payload.new

let div = document.createElement("div")

div.className="message"

div.innerHTML =
"<img class='avatar' src='"+m.avatar+"'>" +
"<div><b>"+m.user+"</b><br>"+m.text+"</div>"

document.getElementById("chat").appendChild(div)

/* 通知 */

notify()

}
)
.subscribe()

function notify(){

if(Notification.permission==="granted"){

new Notification("新しいメッセージ")

}else{

Notification.requestPermission()

}

}

</script>

</body>
</html>
